name: build

# 빌드 검증 — mac 네이티브 + Windows 크로스컴파일(순수 Go, cgo 미사용 단계 기준).
# 릴리스/서명/배포는 scripts/release.sh + add-windows-asset.sh 참조(마스터 플랜 §4~5).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: build (native / darwin)
        run: go build ./...

      # Windows 크로스컴파일은 순수 Go 패키지만 검증한다. 오디오(malgo)·트레이·오버레이는
      # cgo(CoreAudio/Cocoa/WASAPI) 전용이라 CGO 없는 크로스빌드에서 컴파일되지 않는다.
      # Windows 전체 빌드는 대단위 C(배포)에서 windows 러너로 네이티브 빌드한다.
      - name: build (pure packages, windows cross-compile)
        run: >
          GOOS=windows GOARCH=amd64 go build
          ./internal/config/... ./internal/pipeline/... ./internal/subtitle/...
          ./internal/gemini/... ./internal/ipc/... ./internal/cost/...
          ./internal/recording/... ./internal/vad/... ./internal/updater/...

      - name: test
        run: go test ./...
