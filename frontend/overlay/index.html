<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LiveTranslate Overlay</title>
  <style>
    /* Fully transparent surface — only the subtitle text paints.
       The native NSWindow is clear + click-through; this DOM must never
       draw an opaque background or it would show a black rectangle. */
    html, body {
      background: transparent;
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      /* The whole document is display-only; clicks pass through to the
         window (which itself is ignoresMouseEvents:YES). */
      pointer-events: none;
      -webkit-user-select: none;
      user-select: none;
      cursor: default;
      font-family: -apple-system, "Helvetica Neue", "Segoe UI", system-ui, sans-serif;
    }

    /* Bottom-centre subtitle stack, like a film caption. */
    #subtitle {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 8vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      gap: 0.15em;
      pointer-events: none;
      text-align: center;
      padding: 0 4vw;
      box-sizing: border-box;
      transition: opacity 120ms ease;
    }

    #subtitle.hidden { opacity: 0; }

    .line {
      display: inline-block;
      max-width: 92vw;
      color: #ffffff;
      font-weight: 700;
      font-size: clamp(28px, 4.2vw, 64px);
      line-height: 1.25;
      /* Black outline for legibility over any background: webkit stroke
         plus layered text-shadow (works when stroke is unsupported). */
      -webkit-text-stroke: 2px #000;
      text-shadow:
        0 0 4px rgba(0, 0, 0, 0.9),
        2px 2px 3px rgba(0, 0, 0, 0.95),
        -1px -1px 2px rgba(0, 0, 0, 0.9);
      word-break: keep-all;
      overflow-wrap: break-word;
    }

    /* Secondary (source) line rendered slightly smaller/dimmer if present. */
    .line.source {
      font-size: clamp(20px, 3vw, 44px);
      font-weight: 600;
      color: #e8e8e8;
      opacity: 0.92;
    }
  </style>
</head>
<body>
  <div id="subtitle" class="hidden"></div>

  <script>
    // Renders subtitle lines pushed from Go via the Wails event bus.
    // Event: "subtitle:update", payload { lines: string[], visible: bool,
    //         source?: string }.
    (function () {
      const box = document.getElementById("subtitle");

      function render(payload) {
        const lines = (payload && Array.isArray(payload.lines)) ? payload.lines : [];
        const visible = !payload || payload.visible !== false;
        const source = payload && typeof payload.source === "string" ? payload.source : "";

        box.textContent = "";
        for (const text of lines) {
          const el = document.createElement("div");
          el.className = "line";
          el.textContent = text;
          box.appendChild(el);
        }
        if (source) {
          const el = document.createElement("div");
          el.className = "line source";
          el.textContent = source;
          box.appendChild(el);
        }

        box.classList.toggle("hidden", !visible || (lines.length === 0 && !source));
      }

      function wire() {
        if (window.runtime && typeof window.runtime.EventsOn === "function") {
          window.runtime.EventsOn("subtitle:update", render);
          // Initial hint so we know the pipe is live even before first event.
          render({ lines: [], visible: false });
        } else {
          // Runtime not injected yet — retry shortly.
          setTimeout(wire, 50);
        }
      }

      window.addEventListener("DOMContentLoaded", wire);
    })();
  </script>
</body>
</html>
