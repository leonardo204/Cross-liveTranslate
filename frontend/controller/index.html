<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>제어 HUD</title>
  <!--
    U2 제어 HUD — 원본 liveTranslate `MonitorHUD.swift`를 픽셀 수준으로 재현한다.

    원본 스펙(MonitorHUD.swift):
      VStack(alignment:.leading, spacing:8) { header · levelMeter · footer · [costRow] · Divider · controls }
      .padding(.horizontal,12).padding(.vertical,10)
      .frame(width:260, height: showCost ? 176 : 150, alignment:.topLeading)
      배경 = RoundedRectangle(cornerRadius:14,.continuous).fill(.ultraThinMaterial)
      테두리 = Color.white.opacity(0.12) 1px, clip 14

    창(main.go): frameless·투명·always-on-top, 260×176 고정. 카드는 내용에 맞춰(≈150↔176)
    상단 앵커로 배치해 원본의 동적 높이(150↔176)를 재현한다(빈 하단은 투명).

    데이터 계약(U1 controller.go): 이벤트 `hud:update` payload를 그대로 그린다.
    바인딩: Controller.ToggleCapture / ToggleRecording / ShowSettings.
  -->
  <style>
    :root {
      color-scheme: dark;
      /* Apple 시스템 시맨틱 색(다크) 근사 */
      --primary: #ffffff;                       /* .primary (label) */
      --secondary: rgba(235,235,245,0.60);      /* .secondary */
      --tertiary: rgba(235,235,245,0.30);       /* .tertiary */
      --red: #ff3b30;                           /* .red */
      --orange: #ff9500;                        /* .orange */
      --green: #34c759;                         /* .green */
      --accent: #0a84ff;                        /* .accentColor (다크) */
      --track: rgba(255,255,255,0.12);          /* Color.primary.opacity(0.12) */
      --border: rgba(255,255,255,0.12);         /* Color.white.opacity(0.12) */
    }

    html, body {
      margin: 0;
      height: 100%;
      background: transparent;                  /* 투명 창 — 배경이 비침 */
      font-family: -apple-system, "SF Pro Text", "Helvetica Neue", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-user-select: none; user-select: none;
      cursor: default;
    }
    /* 카드를 상단 앵커로 — 원본 alignment:.topLeading + 동적 높이 재현 */
    body { display: flex; align-items: flex-start; }

    /*
      ultraThinMaterial 근사: backdrop-filter blur(30px) + 다크 반투명 배경.
      RoundedRectangle(cornerRadius:14) + white.opacity(0.12) 1px border + clip 14.
    */
    .hud {
      --wails-draggable: drag;                  /* 배경 드래그로 창 이동(원본 isMovableByWindowBackground) */
      box-sizing: border-box;
      width: 100%;
      padding: 10px 12px;                        /* vertical 10, horizontal 12 */
      display: flex; flex-direction: column;
      align-items: stretch;                      /* VStack(alignment:.leading) — 자식은 좌측 정렬(내부 정렬로 처리) */
      gap: 8px;                                  /* spacing 8 */
      color: var(--primary);
      background: rgba(30,30,30,0.55);
      -webkit-backdrop-filter: blur(30px) saturate(1.6);
      backdrop-filter: blur(30px) saturate(1.6);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    /* ---- 1) header: HStack(spacing:6) 상태점 + 상태텍스트 + Spacer + 발화 인디케이터 ---- */
    .header { display: flex; align-items: center; gap: 6px; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; flex: 0 0 auto;
      background: var(--tertiary);              /* .secondary.opacity(0.5) 근사 */
    }
    .status-dot.capturing { background: var(--red); }
    .status-text { font-size: 11px; font-weight: 600; color: var(--primary); }
    .spacer { flex: 1 1 auto; }
    /* 발화 인디케이터: HStack(spacing:3) 아이콘 + 텍스트 */
    .speak { display: flex; align-items: center; gap: 3px; }
    .speak .ico { display: inline-flex; color: var(--secondary); }
    .speak.active .ico { color: var(--green); }
    .speak .label { font-size: 10px; color: var(--secondary); }

    /* ---- 2) levelMeter: 높이 6, Capsule 트랙 + 채움 ---- */
    .meter {
      position: relative; height: 6px; border-radius: 3px;
      background: var(--track); overflow: hidden;
    }
    .meter .fill {
      position: absolute; left: 0; top: 0; height: 100%;
      width: 2px; border-radius: 3px;
      background: var(--green);
      transition: width 0.08s linear;           /* .animation(.linear(duration:0.08)) */
    }

    /* ---- 3) footer: VStack(alignment:.leading, spacing:2) ---- */
    .footer { display: flex; flex-direction: column; gap: 2px; align-items: flex-start; min-width: 0; }
    .footer > * { max-width: 100%; }
    .src {
      font-size: 10px; color: var(--secondary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .vad {
      font-size: 9px; color: var(--tertiary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .gemini {
      font-size: 9px; color: var(--tertiary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      display: flex; align-items: center; gap: 3px;
    }
    .gemini.warn { color: var(--orange); font-weight: 600; }
    .gemini .ico { display: inline-flex; }

    /* ---- 4) costRow: HStack(spacing:6), 9pt monospaced .secondary ---- */
    .cost {
      display: none; align-items: center; gap: 6px;
      font-size: 9px; color: var(--secondary);
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .cost.show { display: flex; }
    .cost .ico { display: inline-flex; color: var(--secondary); }
    .cost .total { font-weight: 600; }

    /* ---- 5) Divider().opacity(0.2) ---- */
    .divider { height: 1px; background: rgba(255,255,255,0.2); opacity: 0.5; }

    /* ---- 6) controls: HStack(spacing:8) 시작/정지 + 녹화 + 설정 ---- */
    .controls {
      display: flex; align-items: stretch; gap: 8px;
      --wails-draggable: no-drag;                /* 버튼 영역은 드래그 제외 */
    }
    button {
      --wails-draggable: no-drag;
      cursor: pointer; border: none; margin: 0;
      font-family: inherit; border-radius: 6px;
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0;
    }
    button:active { filter: brightness(0.92); }
    /* .borderedProminent (tint) — 시작/정지, 가로 꽉 참 */
    .btn-toggle {
      flex: 1 1 auto; height: 26px; gap: 4px;
      color: #fff; font-size: 11px; font-weight: 600;
      background: var(--accent);
    }
    .btn-toggle.running { background: var(--red); }
    .btn-toggle .ico { display: inline-flex; color: #fff; }
    /* .bordered — 녹화 토글 / 설정 (아이콘 버튼) */
    .btn-icon {
      flex: 0 0 auto; width: 30px; height: 26px;
      color: var(--primary);
      background: rgba(255,255,255,0.09);
    }
    .btn-icon .ico { display: inline-flex; }
    /* 녹화 켜짐: red tint */
    .btn-rec.on { background: var(--red); color: #fff; }
    .btn-rec.on .ico { color: #fff; }

    .ico svg { display: block; }
  </style>
</head>
<body>
  <div class="hud">
    <!-- 1) header -->
    <div class="header">
      <span id="dot" class="status-dot"></span>
      <span id="statusText" class="status-text">정지</span>
      <span class="spacer"></span>
      <span id="speak" class="speak">
        <span class="ico"></span><span class="label">무음</span>
      </span>
    </div>

    <!-- 2) level meter -->
    <div class="meter"><div id="level" class="fill"></div></div>

    <!-- 3) footer -->
    <div class="footer">
      <span id="src" class="src">자동 선택</span>
      <span id="vad" class="vad">VAD 꺼짐</span>
      <span id="gemini" class="gemini">연결 안 됨</span>
    </div>

    <!-- 4) cost row (costHUDEnabled일 때만) -->
    <div id="cost" class="cost">
      <span class="ico"></span>
      <span>전송&nbsp;<span id="sent">$0.0000</span></span>
      <span>수신&nbsp;<span id="recv">$0.0000</span></span>
      <span>총&nbsp;<span id="total" class="total">$0.0000</span></span>
    </div>

    <!-- 5) divider -->
    <div class="divider"></div>

    <!-- 6) controls -->
    <div class="controls">
      <button id="toggle" class="btn-toggle" type="button">
        <span class="ico"></span><span class="txt">시작</span>
      </button>
      <button id="rec" class="btn-icon btn-rec" type="button" title="자막 녹화 시작">
        <span class="ico"></span>
      </button>
      <button id="gear" class="btn-icon" type="button" title="설정 열기">
        <span class="ico"></span>
      </button>
    </div>
  </div>

  <script>
    (function () {
      "use strict";
      var $ = function (id) { return document.getElementById(id); };
      var ctrl = function () {
        return (window.go && window.go.main && window.go.main.Controller) || null;
      };
      var usd = function (v) { return "$" + (Number(v) || 0).toFixed(4); };

      // ---- SF Symbol 근사 (인라인 SVG, fill=currentColor) ----
      var ICON = {
        // circle.fill — 발화중 채운 원
        circleFill: '<svg width="8" height="8" viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="8" r="6"/></svg>',
        // circle — 무음 윤곽 원
        circle: '<svg width="8" height="8" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5.4" stroke="currentColor" stroke-width="1.4"/></svg>',
        // play.fill — 시작
        play: '<svg width="9" height="9" viewBox="0 0 16 16" fill="currentColor"><path d="M4.2 3.3v9.4a.6.6 0 0 0 .92.5l7.2-4.7a.6.6 0 0 0 0-1L5.12 2.8a.6.6 0 0 0-.92.5z"/></svg>',
        // stop.fill — 정지
        stop: '<svg width="9" height="9" viewBox="0 0 16 16" fill="currentColor"><rect x="4" y="4" width="8" height="8" rx="1.6"/></svg>',
        // record.circle — 녹화 대기(윤곽 원 + 중앙 점)
        record: '<svg width="11" height="11" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.7"/><circle cx="12" cy="12" r="4" fill="currentColor"/></svg>',
        // record.circle.fill — 녹화 중(채운 원 + 안쪽 점)
        recordFill: '<svg width="11" height="11" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="currentColor"/><circle cx="12" cy="12" r="4" fill="#fff"/></svg>',
        // gearshape.fill — 설정
        gear: '<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94a7.5 7.5 0 0 0 0-1.88l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7 7 0 0 0-1.62-.94l-.36-2.54a.5.5 0 0 0-.5-.42h-3.84a.5.5 0 0 0-.5.42l-.36 2.54a7 7 0 0 0-1.62.94l-2.39-.96a.5.5 0 0 0-.6.22L2.71 8.84a.5.5 0 0 0 .12.64l2.03 1.58a7.5 7.5 0 0 0 0 1.88l-2.03 1.58a.5.5 0 0 0-.12.64l1.92 3.32a.5.5 0 0 0 .6.22l2.39-.96a7 7 0 0 0 1.62.94l.36 2.54a.5.5 0 0 0 .5.42h3.84a.5.5 0 0 0 .5-.42l.36-2.54a7 7 0 0 0 1.62-.94l2.39.96a.5.5 0 0 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58zM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7z"/></svg>',
        // dollarsign.circle — 비용
        dollar: '<svg width="10" height="10" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9.5" fill="none" stroke="currentColor" stroke-width="1.6"/><text x="12" y="16.5" text-anchor="middle" font-size="13" font-weight="700" fill="currentColor" font-family="-apple-system,sans-serif">$</text></svg>',
        // exclamationmark.triangle.fill — 경고
        warn: '<svg width="11" height="10" viewBox="0 0 24 22"><path fill="currentColor" d="M11.13 2.2 0.86 20a1.1 1.1 0 0 0 .95 1.65h20.38a1.1 1.1 0 0 0 .95-1.65L12.87 2.2a1.1 1.1 0 0 0-1.74 0z"/><rect x="11" y="8" width="2" height="6.4" rx="1" fill="#1c1c1e"/><circle cx="12" cy="17.4" r="1.15" fill="#1c1c1e"/></svg>'
      };

      // 레벨 → 색 규칙(원본 meterColor).
      function meterColor(l) {
        if (l > 0.85) return "var(--red)";
        if (l > 0.6) return "var(--orange)";
        return "var(--green)";
      }

      // 정적 아이콘 1회 주입.
      function initIcons() {
        $("gear").querySelector(".ico").innerHTML = ICON.gear;
        $("cost").querySelector(".ico").innerHTML = ICON.dollar;
      }

      function render(h) {
        if (!h) return;

        // 1) header — 상태점/상태텍스트
        var capturing = !!h.capturing;
        $("dot").classList.toggle("capturing", capturing);
        $("statusText").textContent = h.statusText || (capturing ? "캡처중" : "정지");

        // 발화 인디케이터: active = capturing && vadEnabled && speaking
        var active = capturing && !!h.vadEnabled && !!h.speaking;
        var speak = $("speak");
        speak.classList.toggle("active", active);
        speak.querySelector(".ico").innerHTML = active ? ICON.circleFill : ICON.circle;
        speak.querySelector(".label").textContent = active ? "발화" : "무음";

        // 2) level meter — 폭(min 2px) + 색
        var lvl = Math.max(0, Math.min(1, Number(h.level) || 0));
        var bar = $("level");
        bar.style.width = "max(2px, " + (lvl * 100).toFixed(2) + "%)";
        bar.style.background = meterColor(lvl);

        // 3) footer
        $("src").textContent = h.activeSourceLabel || "자동 선택";
        $("vad").textContent = h.vadEnabled ? "VAD 켜짐" : "VAD 꺼짐";

        var g = $("gemini");
        if (h.apiKeyLoaded) {
          g.classList.remove("warn");
          g.innerHTML = "";
          g.textContent = "번역: " + (h.geminiStatus || "");
        } else {
          // 키 없음: 삼각형 경고 + 고정 문구(원본 MonitorHUD 하드코딩)
          g.classList.add("warn");
          g.innerHTML = '<span class="ico">' + ICON.warn +
            '</span><span>API 키 없음 — 설정에서 입력</span>';
        }

        // 4) cost row
        var cost = $("cost");
        cost.classList.toggle("show", !!h.costHUDEnabled);
        $("sent").textContent = usd(h.sentUSD);
        $("recv").textContent = usd(h.recvUSD);
        $("total").textContent = usd(h.totalUSD);

        // 6) controls — 시작/정지(isRunning 단일 진실)
        var running = !!h.isRunning;
        var t = $("toggle");
        t.classList.toggle("running", running);
        t.querySelector(".ico").innerHTML = running ? ICON.stop : ICON.play;
        t.querySelector(".txt").textContent = running ? "정지" : "시작";

        // 녹화 토글
        var recording = !!h.recording;
        var rec = $("rec");
        rec.classList.toggle("on", recording);
        rec.querySelector(".ico").innerHTML = recording ? ICON.recordFill : ICON.record;
        rec.title = recording ? "녹화 중지" : "자막 녹화 시작";
      }

      // 버튼 액션(바인딩) — Controller.d.ts 확인: ToggleCapture/ToggleRecording/ShowSettings.
      function bindActions() {
        $("toggle").addEventListener("click", function () { var c = ctrl(); if (c) c.ToggleCapture(); });
        $("rec").addEventListener("click", function () { var c = ctrl(); if (c) c.ToggleRecording(); });
        $("gear").addEventListener("click", function () { var c = ctrl(); if (c) c.ShowSettings(); });
      }

      // hud:update 구독(250ms + 변화 시). payload를 그대로 render.
      function wire() {
        initIcons();
        bindActions();
        // 초기 아이콘(정지/무음/녹화대기) 표시.
        render({ statusText: "정지", isRunning: false });
        if (window.runtime && window.runtime.EventsOn) {
          window.runtime.EventsOn("hud:update", render);
        }
      }

      if (document.readyState === "loading") {
        window.addEventListener("DOMContentLoaded", wire);
      } else {
        wire();
      }
    })();
  </script>
</body>
</html>
